<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Buscador de Mercados</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 p-4">

<div class="max-w-5xl mx-auto">

  <!-- Header -->
  <div class="bg-blue-700 text-white rounded-xl p-5 mb-5 shadow flex items-center justify-between flex-wrap gap-3">
    <div>
      <h1 class="text-xl font-bold">🏪 Buscador de Mercados</h1>
      <p class="text-blue-200 text-sm mt-1">Haz clic en un mercado para registrar su información</p>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-blue-200 text-sm" id="contador">0 mercados registrados</span>
      <button onclick="abrirModalNuevo()" class="bg-white text-blue-700 text-sm font-bold px-3 py-1.5 rounded-lg hover:bg-blue-50 transition">+ Agregar</button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="bg-white rounded-xl p-4 shadow mb-4 grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-4">
    <div>
      <label class="text-xs font-semibold text-gray-500 mb-1 block">🔍 Buscar</label>
      <input id="search" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Nombre de Mercado"/>
    </div>
    <div>
      <label class="text-xs font-semibold text-gray-500 mb-1 block">📍 Departamento</label>
      <select id="filDep" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-400"></select>
    </div>
    <div>
      <label class="text-xs font-semibold text-gray-500 mb-1 block">🏘️ Distrito</label>
      <select id="filDis" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-400"></select>
    </div>
    <div>
      <label class="text-xs font-semibold text-gray-500 mb-1 block">🏷️ Tipo</label>
      <select id="filTipo" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-400"></select>
    </div>
  </div>

  <!-- Stats -->
  <div class="flex items-center justify-between mb-3 px-1">
    <span class="text-sm text-gray-500">Mostrando <span id="count" class="font-bold text-blue-700">0</span> mercados</span>
    <button onclick="resetFiltros()" class="text-xs text-blue-600 hover:underline">Limpiar filtros</button>
  </div>

  <!-- Loading -->
  <div id="loading" class="bg-white rounded-xl shadow p-10 text-center text-gray-400 text-sm">⏳ Cargando mercados...</div>

  <!-- Tabla -->
  <div class="bg-white rounded-xl shadow overflow-hidden hidden" id="tabla-wrap">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-blue-700 text-white text-left">
            <th class="px-3 py-3 font-semibold w-10">#</th>
            <th class="px-3 py-3 font-semibold">Mercado</th>
            <th class="px-3 py-3 font-semibold">Distrito</th>
            <th class="px-3 py-3 font-semibold hidden md:table-cell">Zona</th>
            <th class="px-3 py-3 font-semibold">Departamento</th>
            <th class="px-3 py-3 font-semibold">Tipo</th>
            <th class="px-3 py-3 font-semibold text-center">Info</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal Registro -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 hidden">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-screen overflow-y-auto">
    <div class="bg-blue-700 text-white rounded-t-2xl p-4 sticky top-0 z-10">
      <div class="flex justify-between items-start">
        <div>
          <p class="text-blue-200 text-xs" id="modal-sub"></p>
          <h2 class="font-bold text-base mt-0.5" id="modal-title"></h2>
          <p class="text-blue-200 text-xs mt-0.5" id="modal-loc"></p>
        </div>
        <button onclick="closeModal()" class="text-white text-xl font-bold hover:text-blue-200 ml-2">✕</button>
      </div>
    </div>
    <div class="p-5 space-y-5">

      <!-- Campaña Activa -->
      <div class="border border-gray-200 rounded-xl p-4">
        <h3 class="text-sm font-bold text-blue-700 mb-3">📢 Campaña Activa</h3>
        <div class="flex gap-2">
          <div class="flex-1">
            <label class="text-xs text-gray-500 mb-1 block">Cliente / Campaña</label>
            <input id="m-campana" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Ej: Coca-Cola..."/>
          </div>
          <div class="w-36">
            <label class="text-xs text-gray-500 mb-1 block">Vigencia</label>
            <input id="m-vigencia" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Ej: Dic 2025"/>
          </div>
        </div>
      </div>

      <!-- Elemento Publicitario -->
      <div class="border border-gray-200 rounded-xl p-4">
        <h3 class="text-sm font-bold text-blue-700 mb-3">🪧 Elemento Publicitario</h3>
        <div class="space-y-3">
          <div class="flex items-center gap-2 flex-wrap">
            <input type="checkbox" id="chk-pasadizo" class="w-4 h-4 accent-blue-700"/>
            <label for="chk-pasadizo" class="text-sm text-gray-700 w-36">Valla en Pasadizo</label>
            <input id="cant-pasadizo" type="number" min="0" class="w-20 border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Cant."/>
            <label class="flex items-center gap-1 cursor-pointer bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg text-sm transition">
              📷 <span class="text-xs">Foto</span>
              <input type="file" accept="image/*" capture="environment" id="foto-pasadizo" class="hidden" onchange="previewFoto(this,'prev-pasadizo')"/>
            </label>
            <img id="prev-pasadizo" class="hidden w-10 h-10 object-cover rounded-lg border"/>
          </div>
          <div class="flex items-center gap-2 flex-wrap">
            <input type="checkbox" id="chk-portico" class="w-4 h-4 accent-blue-700"/>
            <label for="chk-portico" class="text-sm text-gray-700 w-36">Pórtico</label>
            <input id="cant-portico" type="number" min="0" class="w-20 border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Cant."/>
            <label class="flex items-center gap-1 cursor-pointer bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg text-sm transition">
              📷 <span class="text-xs">Foto</span>
              <input type="file" accept="image/*" capture="environment" id="foto-portico" class="hidden" onchange="previewFoto(this,'prev-portico')"/>
            </label>
            <img id="prev-portico" class="hidden w-10 h-10 object-cover rounded-lg border"/>
          </div>
          <div class="flex items-center gap-2 flex-wrap">
            <input type="checkbox" id="chk-perimetral" class="w-4 h-4 accent-blue-700"/>
            <label for="chk-perimetral" class="text-sm text-gray-700 w-36">Perimetral</label>
            <input id="cant-perimetral" type="number" min="0" class="w-20 border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Cant."/>
            <label class="flex items-center gap-1 cursor-pointer bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg text-sm transition">
              📷 <span class="text-xs">Foto</span>
              <input type="file" accept="image/*" capture="environment" id="foto-perimetral" class="hidden" onchange="previewFoto(this,'prev-perimetral')"/>
            </label>
            <img id="prev-perimetral" class="hidden w-10 h-10 object-cover rounded-lg border"/>
          </div>
        </div>
      </div>

      <!-- Pago Mercado -->
      <div class="border border-gray-200 rounded-xl p-4">
        <h3 class="text-sm font-bold text-blue-700 mb-3">💳 Pago Mercado</h3>
        <div class="grid grid-cols-3 gap-2 mb-3">
          <div>
            <label class="text-xs text-gray-500 mb-1 block">Desde</label>
            <input id="m-desde" type="date" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
          </div>
          <div>
            <label class="text-xs text-gray-500 mb-1 block">Hasta</label>
            <input id="m-hasta" type="date" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
          </div>
          <div>
            <label class="text-xs text-gray-500 mb-1 block">Monto (S/.)</label>
            <input id="m-monto" type="number" min="0" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="0.00"/>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <label class="flex items-center gap-1 cursor-pointer bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg text-sm transition">
            📷 <span class="text-xs">Foto del recibo</span>
            <input type="file" accept="image/*" capture="environment" id="foto-recibo" class="hidden" onchange="previewFoto(this,'prev-recibo')"/>
          </label>
          <img id="prev-recibo" class="hidden w-10 h-10 object-cover rounded-lg border"/>
        </div>
      </div>
    </div>

    <div class="px-5 pb-3 flex gap-3">
      <button onclick="guardar()" id="btn-guardar" class="flex-1 bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 rounded-lg transition text-sm">💾 Guardar</button>
      <button onclick="closeModal()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 rounded-lg transition text-sm">Cerrar</button>
    </div>
    <p id="modal-msg" class="text-center text-xs pb-4 font-semibold hidden"></p>
  </div>
</div>

<!-- Modal Nuevo Mercado -->
<div id="modal-nuevo" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 hidden">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
    <div class="bg-blue-700 text-white rounded-t-2xl p-4 flex justify-between items-center">
      <h2 class="font-bold text-base">➕ Agregar Nuevo Mercado</h2>
      <button onclick="cerrarModalNuevo()" class="text-white text-xl font-bold hover:text-blue-200">✕</button>
    </div>
    <div class="p-5 space-y-3">
      <div>
        <label class="text-xs font-semibold text-gray-600 mb-1 block">Nombre del Mercado</label>
        <input id="new-mercado" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Ej: MERCADO CENTRAL"/>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600 mb-1 block">Distrito</label>
        <input id="new-distrito" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Ej: MIRAFLORES"/>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600 mb-1 block">Zona</label>
        <input id="new-zona" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Ej: ZONA LIMA SUR"/>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600 mb-1 block">Departamento</label>
        <input id="new-departamento" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Ej: LIMA"/>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-600 mb-1 block">Tipo</label>
        <select id="new-tipo" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="MINORISTA">MINORISTA</option>
          <option value="MAYORISTA">MAYORISTA</option>
        </select>
      </div>
    </div>
    <div class="px-5 pb-3 flex gap-3">
      <button onclick="guardarNuevoMercado()" id="btn-nuevo" class="flex-1 bg-blue-700 hover:bg-blue-800 text-white font-semibold py-2 rounded-lg transition text-sm">💾 Guardar</button>
      <button onclick="cerrarModalNuevo()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 rounded-lg transition text-sm">Cancelar</button>
    </div>
    <p id="nuevo-msg" class="text-center text-xs pb-4 font-semibold hidden"></p>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxk750Vj7Kx8Fd0YskhiRTT7oMRbFfsg8m7_DsmjjNTirROqhxnNOuk78JEZ42hu2W5/exec";

let data = [];
const extras = {};
let selected = null;

// ── Carga inicial ──────────────────────────────────────────
async function cargarMercados() {
  try {
    const res = await fetch(`${SCRIPT_URL}?accion=listar`);
    const json = await res.json();
    data = json.mercados;
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("tabla-wrap").classList.remove("hidden");
    poblarFiltros();
    renderTabla();
  } catch {
    document.getElementById("loading").textContent = "❌ Error al cargar los mercados. Recarga la página.";
  }
}

function poblarFiltros() {
  poblarSelect("filDep", unique("departamento"));
  poblarSelect("filTipo", unique("tipo"));
  actualizarDistritos();
  document.getElementById("filDep").addEventListener("change", () => { actualizarDistritos(); renderTabla(); });
  document.getElementById("filDis").addEventListener("change", renderTabla);
  document.getElementById("filTipo").addEventListener("change", renderTabla);
  document.getElementById("search").addEventListener("input", renderTabla);
}

function unique(key) {
  return ["TODOS", ...new Set(data.map(d => d[key]))];
}

function poblarSelect(id, vals) {
  document.getElementById(id).innerHTML = vals.map(v => `<option>${v}</option>`).join("");
}

function actualizarDistritos() {
  const dep = document.getElementById("filDep").value;
  const base = dep === "TODOS" ? data : data.filter(d => d.departamento === dep);
  poblarSelect("filDis", ["TODOS", ...new Set(base.map(d => d.distrito))]);
}

function filtrados() {
  const q = document.getElementById("search").value.toLowerCase();
  const dep = document.getElementById("filDep").value;
  const dis = document.getElementById("filDis").value;
  const tipo = document.getElementById("filTipo").value;
  return data.filter(d =>
    (!q || d.mercado.toLowerCase().includes(q)) &&
    (dep === "TODOS" || d.departamento === dep) &&
    (dis === "TODOS" || d.distrito === dis) &&
    (tipo === "TODOS" || d.tipo === tipo)
  );
}

function renderTabla() {
  const rows = filtrados();
  document.getElementById("count").textContent = rows.length;
  document.getElementById("tbody").innerHTML = rows.length === 0
    ? `<tr><td colspan="7" class="text-center py-10 text-gray-400">No se encontraron resultados</td></tr>`
    : rows.map((d, i) => `
      <tr class="${i%2===0?'bg-white':'bg-gray-50'} hover:bg-blue-50 cursor-pointer transition" onclick="openModal(${d.n})">
        <td class="px-3 py-2 text-gray-400">${d.n}</td>
        <td class="px-3 py-2 font-medium text-gray-800">${d.mercado}</td>
        <td class="px-3 py-2 text-gray-600">${d.distrito}</td>
        <td class="px-3 py-2 text-gray-500 hidden md:table-cell text-xs">${d.zona}</td>
        <td class="px-3 py-2 text-gray-600">${d.departamento}</td>
        <td class="px-3 py-2"><span class="px-2 py-0.5 rounded-full text-xs font-semibold ${d.tipo==='MAYORISTA'?'bg-orange-100 text-orange-700':'bg-green-100 text-green-700'}">${d.tipo}</span></td>
        <td class="px-3 py-2 text-center">${extras[d.n]?'✅':'<span class="text-gray-300">○</span>'}</td>
      </tr>`).join("");
}

function resetFiltros() {
  document.getElementById("search").value = "";
  document.getElementById("filDep").value = "TODOS";
  document.getElementById("filTipo").value = "TODOS";
  actualizarDistritos();
  renderTabla();
}

// ── Modal registro ─────────────────────────────────────────
function openModal(n) {
  selected = data.find(d => d.n === n);
  document.getElementById("modal-sub").textContent = `N° ${selected.n} · ${selected.tipo}`;
  document.getElementById("modal-title").textContent = selected.mercado;
  document.getElementById("modal-loc").textContent = `📍 ${selected.distrito} — ${selected.departamento}`;
  const ex = extras[n] || {};
  document.getElementById("m-campana").value = ex.campana || "";
  document.getElementById("m-vigencia").value = ex.vigencia || "";
  document.getElementById("chk-pasadizo").checked = ex.pasadizo || false;
  document.getElementById("cant-pasadizo").value = ex.cantPasadizo || "";
  document.getElementById("chk-portico").checked = ex.portico || false;
  document.getElementById("cant-portico").value = ex.cantPortico || "";
  document.getElementById("chk-perimetral").checked = ex.perimetral || false;
  document.getElementById("cant-perimetral").value = ex.cantPerimetral || "";
  document.getElementById("m-desde").value = ex.desde || "";
  document.getElementById("m-hasta").value = ex.hasta || "";
  document.getElementById("m-monto").value = ex.monto || "";
  ["prev-pasadizo","prev-portico","prev-perimetral","prev-recibo"].forEach(id => {
    const el = document.getElementById(id);
    el.src = ""; el.classList.add("hidden");
  });
  ["foto-pasadizo","foto-portico","foto-perimetral","foto-recibo"].forEach(id => {
    document.getElementById(id).value = "";
  });
  document.getElementById("modal-msg").classList.add("hidden");
  document.getElementById("modal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
  selected = null;
}

function previewFoto(input, previewId) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById(previewId);
    img.src = e.target.result;
    img.classList.remove("hidden");
  };
  reader.readAsDataURL(file);
}

function toBase64(inputId) {
  return new Promise(resolve => {
    const file = document.getElementById(inputId).files[0];
    if (!file) return resolve(null);
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(",")[1]);
    reader.readAsDataURL(file);
  });
}

async function guardar() {
  const btn = document.getElementById("btn-guardar");
  const msg = document.getElementById("modal-msg");
  btn.textContent = "⏳ Guardando...";
  btn.disabled = true;

  const payload = {
    ...selected,
    campana: document.getElementById("m-campana").value,
    vigencia: document.getElementById("m-vigencia").value,
    pasadizo: document.getElementById("chk-pasadizo").checked,
    cantPasadizo: document.getElementById("cant-pasadizo").value,
    portico: document.getElementById("chk-portico").checked,
    cantPortico: document.getElementById("cant-portico").value,
    perimetral: document.getElementById("chk-perimetral").checked,
    cantPerimetral: document.getElementById("cant-perimetral").value,
    desde: document.getElementById("m-desde").value,
    hasta: document.getElementById("m-hasta").value,
    monto: document.getElementById("m-monto").value,
  };

  try {
    const url = `${SCRIPT_URL}?data=${encodeURIComponent(JSON.stringify(payload))}`;
    await fetch(url, { method: "GET", mode: "no-cors" });
    extras[selected.n] = payload;
    document.getElementById("contador").textContent = `${Object.keys(extras).length} mercados registrados`;
    renderTabla();
    msg.textContent = "✅ Guardado correctamente en Google Sheets";
    msg.className = "text-center text-xs pb-4 font-semibold text-green-600";
    msg.classList.remove("hidden");
  } catch {
    msg.textContent = "❌ Error al guardar. Verifica tu conexión.";
    msg.className = "text-center text-xs pb-4 font-semibold text-red-500";
    msg.classList.remove("hidden");
  } finally {
    btn.textContent = "💾 Guardar";
    btn.disabled = false;
  }
}

// ── Modal nuevo mercado ────────────────────────────────────
function abrirModalNuevo() {
  ["new-mercado","new-distrito","new-zona","new-departamento"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("new-tipo").value = "MINORISTA";
  document.getElementById("nuevo-msg").classList.add("hidden");
  document.getElementById("modal-nuevo").classList.remove("hidden");
}

function cerrarModalNuevo() {
  document.getElementById("modal-nuevo").classList.add("hidden");
}

async function guardarNuevoMercado() {
  const btn = document.getElementById("btn-nuevo");
  const msg = document.getElementById("nuevo-msg");
  const mercado = document.getElementById("new-mercado").value.trim().toUpperCase();
  const distrito = document.getElementById("new-distrito").value.trim().toUpperCase();
  const zona = document.getElementById("new-zona").value.trim().toUpperCase();
  const departamento = document.getElementById("new-departamento").value.trim().toUpperCase();
  const tipo = document.getElementById("new-tipo").value;

  if (!mercado || !distrito || !departamento) {
    msg.textContent = "⚠️ Completa al menos Nombre, Distrito y Departamento.";
    msg.className = "text-center text-xs pb-4 font-semibold text-orange-500";
    msg.classList.remove("hidden");
    return;
  }

  btn.textContent = "⏳ Guardando...";
  btn.disabled = true;

  try {
    const url = `${SCRIPT_URL}?accion=agregar&mercado=${encodeURIComponent(mercado)}&distrito=${encodeURIComponent(distrito)}&zona=${encodeURIComponent(zona)}&departamento=${encodeURIComponent(departamento)}&tipo=${tipo}`;
    const res = await fetch(url);
    const json = await res.json();
    if (json.success) {
      data.push({ n: json.n, mercado, distrito, zona, departamento, tipo });
      poblarFiltros();
      renderTabla();
      msg.textContent = "✅ Mercado agregado correctamente";
      msg.className = "text-center text-xs pb-4 font-semibold text-green-600";
      msg.classList.remove("hidden");
      setTimeout(() => cerrarModalNuevo(), 1500);
    }
  } catch {
    msg.textContent = "❌ Error al guardar. Verifica tu conexión.";
    msg.className = "text-center text-xs pb-4 font-semibold text-red-500";
    msg.classList.remove("hidden");
  } finally {
    btn.textContent = "💾 Guardar";
    btn.disabled = false;
  }
}

cargarMercados();
</script>
</body>
</html>
